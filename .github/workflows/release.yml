name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Smoke test help output
        run: go run ./cmd/promptcat --help

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TARGET="promptcat_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          STAGING_DIR="dist/${TARGET}"
          BINARY_NAME="promptcat"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="promptcat.exe"
          fi

          mkdir -p "$STAGING_DIR"

          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${VERSION} -X main.buildDate=${BUILD_DATE}" \
              -o "$STAGING_DIR/$BINARY_NAME" \
              ./cmd/promptcat

          cp README.md LICENSE "$STAGING_DIR/"

          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            "$STAGING_DIR/$BINARY_NAME" --version
          fi

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -rq "${TARGET}.zip" "${TARGET}"
            )
          else
            tar -C dist -czf "dist/${TARGET}.tar.gz" "${TARGET}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          cd dist
          files=( *.tar.gz *.zip )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release archives found" >&2
            exit 1
          fi

          sha256sum "${files[@]}" > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
